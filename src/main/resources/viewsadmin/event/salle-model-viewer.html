<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Salle 3D Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #141f35 0%, #0d1628 100%);
        }

        #viewerShell {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 12px;
        }

        #viewerCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 20px;
            background:
                radial-gradient(circle at top, rgba(92, 133, 214, 0.16), transparent 30%),
                linear-gradient(180deg, #16243e 0%, #0f172a 100%);
        }

        #emptyState {
            position: absolute;
            inset: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 1px dashed rgba(148, 163, 184, 0.45);
            border-radius: 20px;
            color: #9cb1d8;
            background: rgba(15, 23, 42, 0.72);
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 700;
            color: #e5eefb;
            margin-bottom: 8px;
        }

        .empty-copy {
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="viewerShell">
        <canvas id="viewerCanvas"></canvas>
        <div id="emptyState">
            <div class="empty-title">No 3D model available</div>
            <div id="emptyCopy" class="empty-copy">This salle does not have a .glb or .gltf model yet.</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('viewerCanvas');
        const emptyState = document.getElementById('emptyState');
        const emptyCopy = document.getElementById('emptyCopy');

        let renderer;
        let scene;
        let camera;
        let controls;
        let activeModel = null;
        let animationFrameId = null;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111a2d);

            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(0, 1.4, 4.8);

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true,
                alpha: true,
                preserveDrawingBuffer: true
            });
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            resizeRenderer();

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.35);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
            keyLight.position.set(3, 5, 4);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x88aaff, 0.85);
            fillLight.position.set(-4, 2, -2);
            scene.add(fillLight);

            const rimLight = new THREE.PointLight(0x5f8fff, 1.2, 20);
            rimLight.position.set(0, 3, 3);
            scene.add(rimLight);

            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(3.6, 64),
                new THREE.MeshPhongMaterial({
                    color: 0x18263f,
                    transparent: true,
                    opacity: 0.9
                })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -1.15;
            scene.add(floor);

            controls = new THREE.OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.target.set(0, 0.45, 0);
            controls.minDistance = 1.6;
            controls.maxDistance = 8;
            controls.update();

            animate();
        }

        function resizeRenderer() {
            const width = canvas.clientWidth || window.innerWidth;
            const height = canvas.clientHeight || window.innerHeight;
            renderer.setSize(width, height, false);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }

        function animate() {
            animationFrameId = requestAnimationFrame(animate);
            if (activeModel) {
                activeModel.rotation.y += 0.006;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        function clearModel() {
            if (!activeModel) {
                return;
            }
            scene.remove(activeModel);
            activeModel.traverse((child) => {
                if (child.geometry) {
                    child.geometry.dispose();
                }
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(material => material.dispose && material.dispose());
                    } else if (child.material.dispose) {
                        child.material.dispose();
                    }
                }
            });
            activeModel = null;
        }

        function frameModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            model.position.sub(center);
            model.position.y += size.y * 0.15;

            const maxSize = Math.max(size.x, size.y, size.z) || 1;
            const fitDistance = maxSize * 2.15;
            camera.position.set(fitDistance * 0.55, maxSize * 0.8, fitDistance);
            camera.near = Math.max(maxSize / 100, 0.01);
            camera.far = maxSize * 100;
            camera.updateProjectionMatrix();
            controls.target.set(0, size.y * 0.15, 0);
            controls.update();
        }

        function showEmpty(message) {
            clearModel();
            canvas.style.display = 'block';
            emptyState.style.display = 'flex';
            emptyCopy.textContent = message || 'This salle does not have a .glb or .gltf model yet.';
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        function showViewer() {
            emptyState.style.display = 'none';
            canvas.style.display = 'block';
        }

        window.setModelSource = function(source, extension, fileName) {
            if (!source) {
                showEmpty('This salle does not have a .glb or .gltf model yet.');
                return;
            }

            if (!window.THREE || !THREE.GLTFLoader) {
                showEmpty('Three.js loader failed to initialize.');
                return;
            }

            showViewer();
            clearModel();

            const loader = new THREE.GLTFLoader();
            loader.load(
                source,
                function(gltf) {
                    activeModel = gltf.scene;
                    scene.add(activeModel);
                    frameModel(activeModel);
                },
                undefined,
                function(error) {
                    console.error(error);
                    const typeLabel = extension ? extension.toUpperCase() : '3D';
                    const fileLabel = fileName ? ' File: ' + fileName : '';
                    showEmpty('Unable to render this ' + typeLabel + ' model.' + fileLabel + ' Use a valid standalone .glb file if possible.');
                }
            );
        };

        window.showEmpty = showEmpty;

        window.addEventListener('resize', function() {
            if (renderer && camera) {
                resizeRenderer();
            }
        });

        initScene();
    </script>
</body>
</html>
