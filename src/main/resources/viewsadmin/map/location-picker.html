<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Picker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <style>
        html, body, #map {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #eaf1fb;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
    const initialLat = 36.8065;
    const initialLng = 10.1815;
    const map = L.map('map').setView([initialLat, initialLng], 11);
    let marker = L.marker([initialLat, initialLng]).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function pushLocationToApp(label, lat, lng) {
        if (window.javaBridge && typeof window.javaBridge.onLocationSelected === 'function') {
            window.javaBridge.onLocationSelected(label || '', lat, lng);
        }
    }

    async function reverseGeocode(lat, lng) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
            const data = await response.json();
            return data.display_name || `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        } catch (error) {
            return `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        }
    }

    async function geocode(query) {
        if (!query || !query.trim()) {
            return;
        }
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(query)}`);
            const results = await response.json();
            if (!results || !results.length) {
                return;
            }
            const result = results[0];
            const lat = parseFloat(result.lat);
            const lng = parseFloat(result.lon);
            marker.setLatLng([lat, lng]);
            map.setView([lat, lng], 13);
            pushLocationToApp(result.display_name || query, lat, lng);
        } catch (error) {
            console.error(error);
        }
    }

    function setMarker(label, lat, lng) {
        marker.setLatLng([lat, lng]);
        map.setView([lat, lng], 13);
        pushLocationToApp(label, lat, lng);
    }

    map.on('click', async function (event) {
        const lat = event.latlng.lat;
        const lng = event.latlng.lng;
        marker.setLatLng([lat, lng]);
        const label = await reverseGeocode(lat, lng);
        pushLocationToApp(label, lat, lng);
    });

    window.mapApi = {
        geocode,
        setMarker
    };
</script>
</body>
</html>
