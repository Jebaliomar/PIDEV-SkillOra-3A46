<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>SkillORA · Register Face</title>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #05060f; color: #e5e7eb; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; }
  body { background: radial-gradient(circle at 20% 0%, #1a0a2e 0%, #05060f 60%); display: flex; flex-direction: column; align-items: center; padding: 20px 16px 32px; }
  .logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .logo-box { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg, #7c3aed, #22d3ee); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; }
  .brand { font-weight: 700; font-size: 18px; letter-spacing: 0.3px; }
  .card { width: 100%; max-width: 420px; background: rgba(20, 20, 40, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(124, 58, 237, 0.35); border-radius: 18px; padding: 22px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
  h1 { font-size: 22px; margin: 0 0 6px; }
  p.sub { margin: 0 0 18px; color: #9ca3af; font-size: 13px; line-height: 1.5; }
  .video-wrap { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 14px; overflow: hidden; background: #000; border: 1px solid rgba(124, 58, 237, 0.4); }
  video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  .frame { position: absolute; inset: 12%; border: 2px dashed rgba(124, 58, 237, 0.6); border-radius: 50%; pointer-events: none; }
  .status { margin-top: 14px; padding: 10px 12px; border-radius: 10px; background: rgba(124, 58, 237, 0.12); color: #c4b5fd; font-size: 13px; text-align: center; min-height: 38px; display: flex; align-items: center; justify-content: center; }
  .status.ok { background: rgba(34, 197, 94, 0.15); color: #86efac; }
  .status.err { background: rgba(220, 38, 38, 0.15); color: #fca5a5; }
  button { width: 100%; margin-top: 14px; padding: 14px; border: 0; border-radius: 12px; background: linear-gradient(135deg, #7c3aed, #22d3ee); color: white; font-weight: 700; font-size: 16px; cursor: pointer; }
  button:disabled { opacity: 0.5; }
  .footer { margin-top: 16px; font-size: 11px; color: #6b7280; text-align: center; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-box">S</div>
    <div class="brand">SkillORA</div>
  </div>

  <div class="card">
    <h1>Register your face</h1>
    <p class="sub">Center your face inside the circle and tap Capture. We compute a small math signature on this device — no photo is uploaded.</p>

    <div class="video-wrap">
      <video id="v" autoplay playsinline muted></video>
      <div class="frame"></div>
    </div>

    <div class="status" id="status">Loading face engine…</div>
    <button id="btn" disabled>Capture</button>

    <div class="footer">Secure local connection · close this tab when done</div>
  </div>

<script>
const TOKEN = "{{TOKEN}}";
const MODELS = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";
const v = document.getElementById('v');
const btn = document.getElementById('btn');
const status = document.getElementById('status');

function setStatus(t, cls) { status.textContent = t; status.className = 'status' + (cls ? ' ' + cls : ''); }

async function init() {
  try {
    setStatus('Loading face engine…');
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODELS);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODELS);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODELS);

    setStatus('Requesting camera…');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 480, height: 480 }, audio: false });
    v.srcObject = stream;
    await v.play();

    setStatus('Center your face, then tap Capture');
    btn.disabled = false;
  } catch (e) {
    setStatus('Camera error: ' + e.message, 'err');
  }
}

async function capture() {
  btn.disabled = true;
  setStatus('Detecting face…');
  try {
    const det = await faceapi
      .detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
      .withFaceLandmarks()
      .withFaceDescriptor();
    if (!det) {
      setStatus('No face detected. Try again with better light.', 'err');
      btn.disabled = false; return;
    }
    setStatus('Sending to desktop…');
    const arr = Array.from(det.descriptor).join(',');
    const res = await fetch('/face/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, descriptor: arr })
    });
    const j = await res.json();
    if (j.ok) {
      setStatus('Face registered ✓ You can close this tab.', 'ok');
      const tracks = v.srcObject && v.srcObject.getTracks();
      if (tracks) tracks.forEach(t => t.stop());
    } else {
      setStatus('Server rejected: ' + (j.error || 'unknown'), 'err');
      btn.disabled = false;
    }
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    btn.disabled = false;
  }
}

btn.addEventListener('click', capture);
init();
</script>
</body>
</html>
